- name: SSM deploy
        run: |
          set -e
          for IID in ${{ steps.inst.outputs.ids }}; do
            echo "🚀 $IID 배포 시작"
            
            CMD=$(aws ssm send-command --instance-ids $IID \
              --document-name AWS-RunShellScript \
              --parameters 'commands=[
                "sudo aws s3 cp s3://${{ env.S3_BUCKET }}/releases/deploy-latest.zip /tmp/d.zip",
                "sudo mkdir -p /opt/app",
                "sudo unzip -o /tmp/d.zip -d /opt/app",
                "sudo cp /opt/app/frontend/index.html ${{ env.DEPLOY_DIR }}/index.html || true",
                "sudo nginx -t && sudo systemctl reload nginx",
                "sudo chmod +x /opt/app/gradlew",
                "cd /opt/app && sudo ./gradlew bootJar",
                "sudo pkill -f inventory-app.jar || true",
                "sudo -E bash -c \"export \$(sudo cat /opt/app/.env | xargs) && nohup java -jar build/libs/inventory-app.jar > /dev/null 2>&1 &\"",
                "sleep 30",
                "curl -sf http://localhost:8080/actuator/health"
              ]' \
              --timeout-seconds 600 \
              --query Command.CommandId --output text)

            for i in $(seq 1 30); do
              sleep 10
              ST=$(aws ssm get-command-invocation \
                --command-id $CMD --instance-id $IID \
                --query Status --output text 2>/dev/null || echo Pending)
              
              echo "[$IID] Status: $ST"
              if [ "$ST" = "Success" ]; then
                echo "✅ $IID 완료"
                break
              elif [ "$ST" = "Failed" ] || [ "$ST" = "TimedOut" ]; then
                echo "❌ $IID 실패"
                exit 1
              fi
            done
          done
